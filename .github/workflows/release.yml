name: Build and Release Syncpad

on:
  release:
    types: [published]

permissions:
  contents: write

jobs:
  build:
    name: Build on ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        include:
          - os: ubuntu-24.04
            artifact_name: syncpad
            asset_name: syncpad-linux
          - os: macos-latest
            artifact_name: syncpad
            asset_name: syncpad-macos
          - os: windows-latest
            artifact_name: syncpad-windows.zip
            asset_name: syncpad-windows.zip

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      # ===========================================
      # LINUX BUILD (Native Ubuntu with glibc)
      # ===========================================
      - name: Install Dependencies (Linux)
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y libncurses-dev libgit2-dev pkg-config \
            libssl-dev libssh2-1-dev zlib1g-dev libpcre2-dev \
            libhttp-parser-dev libkrb5-dev

      - name: Build (Linux) - Static Linking
        if: runner.os == 'Linux'
        run: |
          gcc main.c -o syncpad \
            $(pkg-config --cflags libgit2) \
            -lncursesw \
            -Wl,-Bstatic -lgit2 -lssh2 -lssl -lcrypto -lpcre2-8 -lz -lhttp_parser \
            -Wl,-Bdynamic -lgssapi_krb5 -lkrb5 -lk5crypto -lcom_err \
            -lpthread -ldl -lrt

      # ===========================================
      # MACOS BUILD (Universal Static Binary)
      # ===========================================
      - name: Install Dependencies (macOS)
        if: runner.os == 'macOS'
        run: brew install ncurses libssh2 openssl@3 cmake

      - name: Build libgit2 Static (macOS)
        if: runner.os == 'macOS'
        run: |
          echo "=== Building libgit2 as universal static library ==="
          git clone --depth 1 --branch v1.8.1 https://github.com/libgit2/libgit2.git
          cd libgit2
          mkdir build && cd build
          cmake -DCMAKE_OSX_ARCHITECTURES="x86_64;arm64" \
                -DBUILD_SHARED_LIBS=OFF \
                -DCMAKE_INSTALL_PREFIX=$PWD/install \
                -DBUILD_TESTS=OFF \
                -DUSE_SSH=ON \
                -DOPENSSL_ROOT_DIR=$(brew --prefix openssl@3) \
                ..
          make -j$(sysctl -n hw.ncpu)
          make install
          echo "=== libgit2 static library built ==="
          ls -lh install/lib/

      - name: Build (macOS) - Universal Static Binary
        if: runner.os == 'macOS'
        run: |
          echo "=== Building syncpad as universal binary ==="
          
          # Get Homebrew prefix (different on Intel vs Apple Silicon)
          BREW_PREFIX=$(brew --prefix)
          
          # Build with explicit static library paths
          clang -arch x86_64 -arch arm64 \
            main.c \
            -o syncpad \
            -I libgit2/build/install/include \
            libgit2/build/install/lib/libgit2.a \
            ${BREW_PREFIX}/lib/libssh2.a \
            ${BREW_PREFIX}/opt/openssl@3/lib/libssl.a \
            ${BREW_PREFIX}/opt/openssl@3/lib/libcrypto.a \
            -lncurses \
            -lz -liconv \
            -framework CoreFoundation \
            -framework Security
          
          echo "=== Build complete ==="

      - name: Verify macOS Binary
        if: runner.os == 'macOS'
        run: |
          echo "=== Binary Architecture ==="
          lipo -info syncpad
          file syncpad
          echo ""
          echo "=== Dynamic Library Dependencies ==="
          otool -L syncpad
          echo ""
          echo "=== Checking for Homebrew paths ==="
          if otool -L syncpad | grep -i "$(brew --prefix)"; then
            echo "WARNING: Binary references Homebrew paths (may not be portable)"
            otool -L syncpad | grep -i "$(brew --prefix)"
          else
            echo "✓ No Homebrew dependencies found - binary is portable"
          fi
          echo ""
          echo "=== Testing binary execution ==="
          ./syncpad --version 2>&1 || echo "Note: --version flag may not exist, exit code: $?"

      # ===========================================
      # WINDOWS BUILD (via MSYS2 + MinGW + ncurses)
      # ===========================================
      - name: Setup MSYS2 (Windows)
        if: runner.os == 'Windows'
        uses: msys2/setup-msys2@v2
        with:
          update: true
          install: mingw-w64-x86_64-gcc mingw-w64-x86_64-ncurses mingw-w64-x86_64-libgit2 mingw-w64-x86_64-pkgconf mingw-w64-x86_64-zlib mingw-w64-x86_64-openssl zip

      - name: Build (Windows)
        if: runner.os == 'Windows'
        shell: msys2 {0}
        run: gcc main.c -lncursesw $(pkg-config --libs --cflags libgit2) -o syncpad.exe

      # ===========================================
      # GATHER WINDOWS DLLS AND CREATE ZIP
      # ===========================================
      - name: Gather Windows DLLs
        if: runner.os == 'Windows'
        shell: msys2 {0}
        run: |
          mkdir -p syncpad-windows
          cp syncpad.exe syncpad-windows/
          ldd syncpad.exe | grep mingw64 | awk '{print $3}' | while read dll; do
            if [ -f "$dll" ]; then
              cp "$dll" syncpad-windows/
              echo "Copied: $(basename $dll)"
            fi
          done
          echo "=== Windows Distribution Contents ==="
          ls -lh syncpad-windows/

      - name: Create Windows ZIP
        if: runner.os == 'Windows'
        shell: msys2 {0}
        run: |
          cd syncpad-windows
          zip -r ../syncpad-windows.zip .
          cd ..
          echo "=== Created ZIP Archive ==="
          ls -lh syncpad-windows.zip

      # ===========================================
      # UPLOAD ARTIFACT TO RELEASE
      # ===========================================
      - name: Prepare artifact for upload
        shell: bash
        run: |
          if [ "${{ runner.os }}" = "Windows" ]; then
            echo "Windows zip ready: ${{ matrix.asset_name }}"
          else
            mv ${{ matrix.artifact_name }} ${{ matrix.asset_name }}
          fi

      - name: Upload Release Asset
        uses: softprops/action-gh-release@v1
        with:
          files: ${{ matrix.asset_name }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
